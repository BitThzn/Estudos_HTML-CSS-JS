<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>
        tennte abrir esse site em varios dispositivos diferentes ou simplesmente aumente ou diminua o tamanho do seu navegador.
    </p>

    <picture>
        <source media="(max-width: 750px)" srcset="img/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="img/foto-m.png" type="image/png">
        <img src="img/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>
        Reproduzindo audio
    </h1>
    <p>Vamos apreender a reproduzer audios em HTML5</p> 
    <audio preload="metadata" controls autoplay>
        <source src="midia/umaebom.mp3" type="audio/mpeg">
        <source src="midia/umaebom.ogg" type="audio/ogg">
        <source src="midia/umaebom.wav" type="audio/wav">
        <p>Seu navegador não suporta a reprodução deste audio. clique <a href="midia/umaebom.mp3" download="umaebom.mp3">aqui</a> para baixar o arquivo</p>
    </audio>
    <!-- MP3 WAV OGG -->

</body>
</html>
